<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PHP84 CORRAD User Manual</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="page-header">
        <div class="brand-wrap">
          <div class="brand-mark">CORRAD</div>
          <div>
            <p class="brand-label">PHP84 CORRAD</p>
            <h1>PHP84 CORRAD User Manual</h1>
          </div>
        </div>
        <div class="search-wrap">
          <label for="searchInput" class="search-label">Search manual</label>
          <input id="searchInput" type="search" placeholder="Cari tajuk manual atau topik..." autocomplete="off" />
        </div>
      </header>

      <div class="page-content">
        <aside class="sidebar">
          <nav aria-label="Manual navigation">
            <ul id="sidebarNav" class="sidebar-list"></ul>
          </nav>
        </aside>

        <main class="content-area">
          <div id="contentBody" class="content-body">
            <div class="loading-card">Memuatkan manual...</div>
          </div>
          <div class="pagination" id="pagination"></div>
        </main>
      </div>
    </div>

    <button id="backToTop" class="back-to-top" type="button">Back to top</button>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
